name: Process social submission

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  reject-untrusted:
    if: >-
      contains(github.event.issue.labels.*.name, 'social-submission') &&
      !contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.issue.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Thanks for the submission. This form is limited to invited showcase collaborators.',
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });

  create-review:
    if: >-
      contains(github.event.issue.labels.*.name, 'social-submission') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.issue.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate post data
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/process-social-submission.mjs
      - name: Create review pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: social-submission/issue-${{ github.event.issue.number }}
          delete-branch: true
          commit-message: Add social post from issue #${{ github.event.issue.number }}
          title: Add social post from issue #${{ github.event.issue.number }}
          body: |
            Generated from #${{ github.event.issue.number }}.

            Please verify the title, description, thumbnail, and embed before merging.
      - uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.create-pr.outputs.pull-request-url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: url ? `A review pull request is ready: ${url}` : 'The submission was processed. No changes were needed.',
            });
